# Репозиторий = папка backend. URL: https://medtest1-backend.onrender.com

services:
  - type: web
    name: medtest1-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: DB_FILE
        value: ./data/data.sqlite
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
